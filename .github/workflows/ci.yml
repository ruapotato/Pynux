name: Hamnix CI

# Replaces the retired MCU-OS workflow (commit d4d066e). Scope: the
# bare-metal x86_64 kernel + the core regression battery under
# scripts/test_*.sh. The Linux ABI track (test_u*.sh / test_l*.sh)
# needs musl-gcc + a built Linux kernel tree and is intentionally
# left out of this commit; a follow-up workflow will own that lane.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hamnix-bare-metal:
    name: Bare-metal kernel + regression battery
    runs-on: ubuntu-latest
    # A full pass of all 14 tests rebuilds the kernel ~14 times and
    # boots QEMU ~14 times. Locally each test takes ~30-90s. 25 min
    # gives headroom; if QEMU hangs the timeout fires before the
    # runner is wasted.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            grub-pc-bin \
            grub-efi-amd64-bin \
            xorriso \
            ovmf

      - name: Compile bare-metal kernel
        run: |
          # build/ doesn't exist on a fresh checkout — the linker
          # bails with "cannot open output file: No such file or
          # directory" without this. Locally it's already there
          # from prior runs, so the issue only shows up in CI.
          mkdir -p build
          python3 -m compiler.adder compile \
            --target=x86_64-bare-metal \
            init/main.ad \
            -o build/hamnix-vmlinux.elf

      - name: Build userland
        run: bash scripts/build_user.sh

      # Compiler regression suite — one fixture per known Adder
      # compiler quirk. Runs cheap host-side lexer unit tests + the
      # per-quirk QEMU fixtures via scripts/run_compiler_tests.sh.
      # See CONTRIBUTING.md "Compiler regression suite".
      - name: compiler regression suite
        run: bash scripts/run_compiler_tests.sh 2>&1 | tee /tmp/run_compiler_tests.log
      - name: Upload compiler regression suite log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run_compiler_tests-log
          path: /tmp/run_compiler_tests.log
          if-no-files-found: ignore

      # Regression battery — one step per test so a failing test name
      # is visible in the CI run UI. Order is shortest-first so quick
      # failures fail fast. Each step uploads its serial log on
      # failure for post-mortem from the run page.

      - name: test_hamsh
        run: bash scripts/test_hamsh.sh 2>&1 | tee /tmp/test_hamsh.log
      - name: Upload test_hamsh log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test_hamsh-log
          path: /tmp/test_hamsh.log
          if-no-files-found: ignore

      - name: test_errstr
